<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text to Audio Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="noise"></div>

<main class="container">
  <header>
    <div class="logo-mark">◈</div>
    <h1>Audio<span class="accent">Studio</span></h1>
    <p class="subtitle">Edge TTS · British Neural Voice</p>
  </header>

  <div class="card">
    <div class="card-inner">
      <label class="field-label">NARRATION TEXT</label>
      <textarea id="textInput" placeholder="Type or paste your text here...&#10;&#10;The voice will speak naturally with adjusted pitch and rate."></textarea>
      <div class="char-count"><span id="charCount">0</span> characters</div>

      <div class="actions">
        <button class="btn btn-convert" onclick="convertAudio()" id="convertBtn">
          <span class="btn-icon">▶</span>
          <span class="btn-label">Convert</span>
        </button>
        <button class="btn btn-download" onclick="downloadAudio()" id="downloadBtn" disabled>
          <span class="btn-icon">↓</span>
          <span class="btn-label">Download</span>
        </button>
      </div>

      <div class="status-bar" id="statusBar">
        <div class="status-dot" id="statusDot"></div>
        <span id="status">Ready</span>
      </div>

      <div class="player-wrap" id="playerWrap">
        <label class="field-label">PREVIEW</label>
        <audio id="audioPlayer" controls></audio>
      </div>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
